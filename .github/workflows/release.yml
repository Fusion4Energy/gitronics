name: Release

on:
  push:
    tags:
      # GitHub Actions tag filters use glob patterns (not regex).
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # 1. Publish gitronics crate to crates.io
  # ──────────────────────────────────────────────
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python (Required for PyO3 build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          # Regenerate Cargo.lock with updated version
          cargo update --workspace

      - name: Publish gitronics
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p gitronics --allow-dirty

  # ──────────────────────────────────────────────
  # 2. Build Python wheels for each platform
  # ──────────────────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64 (manylinux via docker)
          - os: ubuntu-latest
            target: x86_64
          # Linux aarch64 (cross-compiled)
          - os: ubuntu-latest
            target: aarch64
          # macOS x86_64
          - os: macos-latest
            target: x86_64
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64
          # Windows x86_64
          - os: windows-latest
            target: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          fi

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          # Use manylinux for Linux builds to maximise compatibility
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────
  # 3. Build a pure-Python sdist (source dist)
  # ──────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ──────────────────────────────────────────────
  # 4. Publish wheels + sdist to PyPI
  # ──────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi
    permissions:
      id-token: write # for Trusted Publishing (OIDC) — no token secret needed
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ──────────────────────────────────────────────
  # 5. Create/update GitHub Release for the tag
  # ──────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    permissions:
      contents: write
    steps:
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
