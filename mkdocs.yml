site_name: Gitronics
site_description: Build MCNP neutronics models from modular components
site_url: https://fusion4energy.github.io/gitronics/
repo_url: https://github.com/Fusion4Energy/gitronics
repo_name: Fusion4Energy/gitronics
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.integrate

plugins:
  - search
  - autorefs

hooks:
  - docs/hooks/version_from_git.py

extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started:
      - Overview: getting_started.md
      - Concepts: getting_started/concepts.md
      - Project Structure: getting_started/project_structure.md
      - File Types: getting_started/file_types.md
      - Configuration File: getting_started/configuration_file.md
      - Building a Model: getting_started/building_a_model.md
      - Card ID Numbers: getting_started/card_id_numbers.md
      - Migrating an Existing Model: getting_started/migrating.md
      - Starting a New Project: getting_started/new_project.md
      - Assessments: getting_started/assessments.md
  - Usage:
      - Build: usage/build.md
      - Migrate: usage/migrate.md
  - Best Practices: best_practices.md
  - Examples: examples.md
